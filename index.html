<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>拡大コピーシミュレーター</title>

<style>

body{
    font-family:"Yu Gothic",sans-serif;
    text-align:center;
    margin:20px;
    background:white;
}

h1{
    font-size:2rem;
}

.control{
    margin:20px 0;
}

label{
    font-size:1.3rem;
    font-weight:bold;
}

input[type="number"]{
    width:130px;
    font-size:1.4rem;
    text-align:center;
}

input[type="range"]{
    width:90%;
}

#paperArea{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:80px;
    min-height:450px;
    margin-top:20px;
}

.paperGroup{
    text-align:center;
}

.paperLabel{
    font-size:1.4rem;
    font-weight:bold;
    margin-bottom:10px;
}

.paper{
    background:white;
    border:4px solid black;
    overflow:hidden;
    box-sizing:border-box;
    position:relative;
}

#basePaper{
    width:148px;
    height:210px;
}

#scaledPaper{
    width:148px;
    height:210px;
}

.paperContent{
    padding:12px;
    transform-origin:top left;
}

.sampleText{
    text-align:left;
    font-size:10.5pt;
    line-height:1.4;
}

.box{
    width:50px;
    height:25px;
    background:#888;
    margin-top:20px;
}

.circle{
    width:35px;
    height:35px;
    border-radius:50%;
    border:3px solid black;
    margin-top:20px;
}

.sliderBlock{
    width:90%;
    max-width:700px;
    margin:25px auto;
}

#info{
    margin-top:20px;
    font-size:1.4rem;
    line-height:1.8;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>拡大コピーシミュレーター</h1>

<div class="control">

<label>
<input type="checkbox"
id="textCheck">
文字を表示
</label>

&nbsp;&nbsp;&nbsp;

<label>
<input type="checkbox"
id="shapeCheck">
図形を表示
</label>

</div>

<div id="paperArea">

<div class="paperGroup">

<div class="paperLabel">
基準用紙
</div>

<div id="basePaper"
class="paper">

<div class="paperContent">

<div class="sampleText">
福岡県<br>
北九州市<br>
八幡東区
</div>

<div class="box"></div>

<div class="circle"></div>

</div>

</div>

</div>

<div class="paperGroup">

<div class="paperLabel">
変形後
</div>

<div id="scaledPaper"
class="paper">

<div id="scaledContent"
class="paperContent">

<div class="sampleText">
福岡県<br>
北九州市<br>
八幡東区
</div>

<div class="box"></div>

<div class="circle"></div>

</div>

</div>

</div>

</div>

<div class="sliderBlock">

<div class="sliderRow">

<label>横倍率（％）</label>

<input
type="number"
id="widthInput"
value="100"
min="50"
max="300">

<input
type="range"
id="widthSlider"
value="100"
min="50"
max="300">

</div>

<div class="sliderBlock">

<div class="sliderRow">

<label>縦倍率（％）</label>

<input
type="number"
id="heightInput"
value="100"
min="50"
max="300">

<input
type="range"
id="heightSlider"
value="100"
min="50"
max="300">

</div>

</div>
<div id="info"></div>

<script>

const widthInput =
document.getElementById("widthInput");

const heightInput =
document.getElementById("heightInput");

const widthSlider =
document.getElementById("widthSlider");

const heightSlider =
document.getElementById("heightSlider");

const scaledPaper =
document.getElementById("scaledPaper");

const scaledContent =
document.getElementById("scaledContent");

const textCheck =
document.getElementById("textCheck");

const shapeCheck =
document.getElementById("shapeCheck");

const info =
document.getElementById("info");

function updateVisibility(){

document
.querySelectorAll(".sampleText")
.forEach(el=>{

el.style.display =
textCheck.checked
? "block"
: "none";

});

document
.querySelectorAll(".box,.circle")
.forEach(el=>{

el.style.display =
shapeCheck.checked
? "block"
: "none";

});

}

function updateDisplay(){

let widthScale =
parseFloat(widthInput.value);

let heightScale =
parseFloat(heightInput.value);

if(isNaN(widthScale)) widthScale = 100;
if(isNaN(heightScale)) heightScale = 100;

widthSlider.value = widthScale;
heightSlider.value = heightScale;

scaledPaper.style.width =
(148 * widthScale / 100) + "px";

scaledPaper.style.height =
(210 * heightScale / 100) + "px";

scaledContent.style.transform =
`scale(${widthScale/100},${heightScale/100})`;

const areaRatio =
(widthScale/100) *
(heightScale/100);

if(Math.abs(areaRatio - 2) < 0.03){

scaledPaper.style.border =
"8px solid purple";

}else{

scaledPaper.style.border =
"4px solid black";

}

info.innerHTML =

`横倍率：${widthScale.toFixed(0)}％<br>
縦倍率：${heightScale.toFixed(0)}％<br><br>
面積倍率：${areaRatio.toFixed(2)}倍`;

}

widthInput.addEventListener(
"input",
updateDisplay
);

heightInput.addEventListener(
"input",
updateDisplay
);

widthSlider.addEventListener(
"input",
function(){

widthInput.value =
widthSlider.value;

updateDisplay();

}
);

heightSlider.addEventListener(
"input",
function(){

heightInput.value =
heightSlider.value;

updateDisplay();

}
);

textCheck.addEventListener(
"change",
updateVisibility
);

shapeCheck.addEventListener(
"change",
updateVisibility
);

updateVisibility();
updateDisplay();

</script>

</body>
</html>
