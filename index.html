<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>拡大コピーシミュレーター</title>

<style>

body{
    font-family:"Yu Gothic",sans-serif;
    text-align:center;
    margin:20px;
    background:white;
}

h1{
    font-size:2rem;
}

.control{
    margin:15px 0;
}

button{
    font-size:1.3rem;
    padding:10px 20px;
}

label{
    font-size:1.3rem;
    font-weight:bold;
}

input[type="number"]{
    width:120px;
    font-size:1.4rem;
    text-align:center;
}

input[type="range"]{
    width:85%;
}

#paperArea{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:80px;
    margin-top:20px;
    min-height:420px;
}

.paperGroup{
    text-align:center;
}

.paperLabel{
    font-size:1.4rem;
    font-weight:bold;
    margin-bottom:10px;
}

.paper{
    background:white;
    border:4px solid black;
    box-sizing:border-box;
    overflow:hidden;
    position:relative;
}

#a4Paper{
    width:148px;
    height:210px;
}

#scaledPaper{
    width:148px;
    height:210px;
}

#paperContent{
    transform-origin:top left;
    padding:12px;
}

.sampleText{
    text-align:left;
    line-height:1.4;
    font-size:10.5pt;
}

.box{
    width:50px;
    height:25px;
    background:#888;
    margin-top:20px;
}

.circle{
    width:35px;
    height:35px;
    border-radius:50%;
    border:3px solid black;
    margin-top:20px;
}

#sliderArea{
    margin-top:20px;
}

.sliderBlock{
    margin:20px auto;
    width:90%;
    max-width:700px;
}

#info{
    margin-top:20px;
    font-size:1.3rem;
    line-height:1.8;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>拡大コピーシミュレーター</h1>
<div class="control">

<label>
<input type="checkbox"
id="textCheck"
checked>
文字を表示
</label>

&nbsp;&nbsp;&nbsp;&nbsp;

<label>
<input type="checkbox"
id="shapeCheck"
checked>
図形を表示
</label>

</div>
<div id="paperArea">

<div class="paperGroup">

<div class="paperLabel">
基準（A4）
</div>

<div id="a4Paper" class="paper">

<div style="padding:12px">

<div class="sampleText">
福岡県<br>
北九州市<br>
八幡東区
</div>

<div class="box"></div>

<div class="circle"></div>

</div>

</div>

</div>

<div class="paperGroup">

<div class="paperLabel">
変形後
</div>

<div id="scaledPaper" class="paper">

<div id="paperContent">

<div class="sampleText">
福岡県<br>
北九州市<br>
八幡東区
</div>

<div class="box"></div>

<div class="circle"></div>

</div>

</div>

</div>

</div>

<div id="sliderArea">

<div class="sliderBlock">

<label>横方向（％）</label>
<br><br>

<input
type="number"
id="widthInput"
value="100"
min="50"
max="200">

<br><br>

<input
type="range"
id="widthSlider"
min="50"
max="200"
value="100">

</div>

<div class="sliderBlock">

<label>縦方向（％）</label>
<br><br>

<input
type="number"
id="heightInput"
value="100"
min="50"
max="200">

<br><br>

<input
type="range"
id="heightSlider"
min="50"
max="200"
value="100">

</div>

</div>

<div id="info"></div>

<script>

const widthInput =
document.getElementById("widthInput");

const heightInput =
document.getElementById("heightInput");

const widthSlider =
document.getElementById("widthSlider");

const heightSlider =
document.getElementById("heightSlider");

const scaledPaper =
document.getElementById("scaledPaper");

const paperContent =
document.getElementById("paperContent");

const info =
document.getElementById("info");
const textCheck =
document.getElementById("textCheck");

const shapeCheck =
document.getElementById("shapeCheck");
function updateDisplay(){

    let widthScale =
    parseFloat(widthInput.value);

    let heightScale =
    parseFloat(heightInput.value);

    if(isNaN(widthScale)) widthScale = 100;
    if(isNaN(heightScale)) heightScale = 100;

    widthSlider.value = widthScale;
    heightSlider.value = heightScale;

    scaledPaper.style.width =
    (148 * widthScale / 100) + "px";

    scaledPaper.style.height =
    (210 * heightScale / 100) + "px";

    paperContent.style.transform =
    `scaleX(${widthScale/100})
     scaleY(${heightScale/100})`;

    const areaRatio =
    (widthScale/100) *
    (heightScale/100);

    if(Math.abs(areaRatio - 2) < 0.03){

        scaledPaper.style.border =
        "8px solid purple";

    }else{

        scaledPaper.style.border =
        "4px solid black";

    }

    info.innerHTML =

    `横倍率：${widthScale.toFixed(0)}％<br>
     縦倍率：${heightScale.toFixed(0)}％<br><br>

     面積倍率：
     ${areaRatio.toFixed(2)}倍`;

}

function updateVisibility(){

    document
    .querySelectorAll(".sampleText")
    .forEach(el=>{

        el.style.display =
        textCheck.checked
        ? "block"
        : "none";

    });

    document
    .querySelectorAll(".box,.circle")
    .forEach(el=>{

        el.style.display =
        shapeCheck.checked
        ? "block"
        : "none";

    });

}

textCheck.addEventListener(
"change",
updateVisibility
);

shapeCheck.addEventListener(
"change",
updateVisibility
);

updateVisibility();
widthInput.addEventListener(
"input",
updateDisplay
);

heightInput.addEventListener(
"input",
updateDisplay
);

widthSlider.addEventListener(
"input",
()=>{
    widthInput.value =
    widthSlider.value;

    updateDisplay();
}
);

heightSlider.addEventListener(
"input",
()=>{
    heightInput.value =
    heightSlider.value;

    updateDisplay();
}
);

updateDisplay();

</script>

</body>
</html>
